name = "dauligor-storage"
main = "index.js"
compatibility_date = "2026-04-26"
preview_urls = false

[vars]
R2_PUBLIC_URL = "https://images.dauligor.com"
# Pages Functions origin. The scheduled() handler calls
# `${APP_URL}/api/admin/prewarm-spell-cache` to keep the
# `consumer_spell_list_cache` warm. Authenticated via the shared
# `API_SECRET` (same Bearer token used elsewhere in the worker).
# For local dev, override in `.dev.vars` with the Pages dev URL.
APP_URL = "https://dauligor.com"

[observability]
enabled = true

[observability.logs]
enabled = true

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "dauligor-storage"

[[d1_databases]]
binding = "DB"
database_name = "dauligor-db"
database_id = "25a9d61a-29ec-42c7-9dae-8cde8d88913d"
migrations_dir = "migrations"

# Cron triggers (the `scheduled()` handler dispatches on `event.cron`):
#   • "30 3 * * *" — daily 03:30 UTC: prune resolved pending_revisions older
#     than 30 days (admin pins survive) + spell-cache pre-warm.
#   • "* * * * *"  — every minute: drain ONE due module-export rebake-queue
#     entry. Budget is 1 because a class rebake fans out to ~25 subrequests and
#     the FREE-plan cap is 50 per invocation — one-per-minute keeps each call
#     safe while still draining a bulk "rebake all" within ~1–2h, gradually
#     (never a burst). Idle minutes are cheap (a single empty queue check).
[triggers]
crons = ["30 3 * * *", "* * * * *"]
